<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zettel-Workbench v7.5 (Safe Sync)</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg: #111110; --surface: #1c1c1a; --border: #2c2c29;
            --accent: #c4b48e; --ink: #e6e4dc; --ink-dim: #4e4c46;
            --mono: 'JetBrains Mono', monospace;
        }
        body { font-family: 'Lora', serif; background: var(--bg); color: var(--ink); padding: 15px; line-height: 1.6; padding-bottom: 120px; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { font-family: var(--mono); font-size: 1rem; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        .api-config { background: #1a1a15; border: 1px dashed var(--border); padding: 15px; border-radius: 8px; margin-bottom: 25px; }
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 15px; }
        
        .zettel-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 30px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .path-row { display: flex; gap: 10px; margin-bottom: 20px; background: #161614; padding: 15px; border-radius: 6px; border: 1px solid #222; }
        
        label { font-family: var(--mono); font-size: 0.62rem; text-transform: uppercase; color: var(--ink-dim); display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; background: #000; border: 1px solid var(--border); color: var(--ink); padding: 10px; border-radius: 4px; font-family: inherit; font-size: 0.92rem; box-sizing: border-box;}
        
        .ai-btn { background: #2d2d2a; color: var(--accent); border: 1px solid var(--accent); padding: 8px 12px; font-size: 0.7rem; cursor: pointer; border-radius: 4px; font-family: var(--mono); transition: 0.2s; min-width: 80px;}
        .ai-btn:hover { background: var(--accent); color: #000; }
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }

        .tree-preview { font-family: var(--mono); font-size: 0.72rem; color: var(--accent); margin-top: 12px; padding: 8px; background: #000; border-radius: 4px; border-left: 3px solid var(--accent); }
        .link-pill { cursor: pointer; background: var(--border); padding: 4px 10px; border-radius: 4px; margin-right: 8px; display: inline-block; margin-bottom: 8px; color: var(--accent); font-family: var(--mono); font-size: 0.75rem; border: 1px solid transparent;}
        .link-pill:hover { border-color: var(--accent); }

        .actions { position: sticky; bottom: 15px; display: flex; gap: 10px; background: rgba(17,17,16,0.95); padding: 15px; border-top: 1px solid var(--border); justify-content: center; backdrop-filter: blur(10px); z-index: 100; border-radius: 12px; }
        button.primary { background: var(--accent); color: #000; border: none; padding: 12px 20px; border-radius: 5px; font-family: var(--mono); font-weight: bold; cursor: pointer; font-size: 0.85rem;}
        .delete-btn { color: #9e5a52; background: none; font-size: 0.65rem; border: none; cursor: pointer; position: absolute; top: 12px; right: 12px; font-family: var(--mono); opacity: 0.6;}
    </style>
</head>
<body>

<div class="container">
    <h1>Zettel-Workbench v7.5 (Sync & Merge)</h1>

    <div class="api-config">
        <div class="config-grid">
            <div><label>OpenAI Key</label><input type="password" id="apiKey" placeholder="sk-..."></div>
            <div><label>GitHub Token</label><input type="password" id="githubToken" placeholder="ghp_..."></div>
            <div><label>Gist ID</label><input type="text" id="gistId" placeholder="ID aus Gist-URL"></div>
        </div>
        <div class="btn-row">
            <button class="ai-btn" onclick="saveToGist()">☁️ Cloud Save (Overwrite)</button>
            <button class="ai-btn" onclick="mergeFromGist()">🌿 Cloud Merge (Safe)</button>
            <button class="ai-btn" onclick="loadFromGist()">🔄 Cloud Load (Reset Local)</button>
            <button class="ai-btn" style="border-color: #9e5a52; color: #9e5a52;" onclick="clearWorkbench()">🗑️ Reset Desk</button>
        </div>
    </div>
    
    <div id="workbench"></div>

    <div class="actions">
        <button class="primary" onclick="addZettel()">+ Neuer Zettel</button>
        <button style="background:none; border:1px solid var(--accent); color:var(--accent); padding:12px 20px; border-radius:5px; cursor:pointer; font-family: var(--mono); font-size: 0.85rem;" onclick="exportZip()">📦 ZIP Export</button>
    </div>
</div>

<script>
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

let zettelCount = 0;

function addZettel() {
    zettelCount++;
    const id = Date.now();
    const card = document.createElement('div');
    card.className = 'zettel-card';
    card.id = `card-${id}`;
    card.innerHTML = `
        <button class="delete-btn" onclick="removeCard(${id})">[Löschen]</button>
        <div class="path-row">
            <div style="flex:2"><label>Parent (z.B. 10.1)</label><input type="text" id="parent-${id}" oninput="update(${id})"></div>
            <div style="flex:1"><label>Kürzel (ID)</label><input type="text" id="kürzel-${id}" oninput="update(${id})"></div>
        </div>
        <div style="margin-bottom:15px">
            <label>Zitat / Roh-Inhalt</label>
            <textarea id="quote-${id}" placeholder="Inhalt..."></textarea>
            <button class="ai-btn" style="margin-top:10px" onclick="runAI(${id})">✨ KI Vorschlag</button>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
            <div style="grid-column: span 2"><label>Titel</label><input type="text" id="title-${id}" oninput="update(${id})"></div>
            <div style="grid-column: span 2"><label>Zusammenfassung</label><input type="text" id="summary-${id}" oninput="update(${id})"></div>
            <div style="grid-column: span 2"><label>Anmerkung</label><textarea id="note-${id}"></textarea></div>
        </div>
        <div id="preview-${id}" class="tree-preview"></div>
        <div id="pills-${id}" style="margin-top:15px"></div>
    `;
    document.getElementById('workbench').appendChild(card);
    update(id);
}

function removeCard(id) { document.getElementById(`card-${id}`).remove(); updateAll(); }

function update(id) {
    const parent = document.getElementById(`parent-${id}`).value.trim();
    let kuerzel = document.getElementById(`kürzel-${id}`).value.trim().replace(/[^a-zA-Z0-9.]/g, '');
    const title = document.getElementById(`title-${id}`).value.trim();
    const fullFn = parent ? `${parent}.${kuerzel}` : kuerzel;
    const card = document.getElementById(`card-${id}`);
    if(!card) return;
    card.setAttribute('data-filename', fullFn);
    card.setAttribute('data-kuerzel', kuerzel);
    const display = title ? `${kuerzel} - ${title}` : kuerzel;
    document.getElementById(`preview-${id}`).innerText = `Baum: ${display}`;
    updateAll();
}

function updateAll() {
    const cards = document.querySelectorAll('.zettel-card');
    cards.forEach(card => {
        const cId = card.id.replace('card-', '');
        const pills = document.getElementById(`pills-${cId}`);
        if(!pills) return;
        pills.innerHTML = "<label>Link:</label>";
        cards.forEach(other => {
            const oId = other.id.replace('card-', '');
            if(cId === oId) return;
            const oFn = other.getAttribute('data-filename');
            const oTitle = document.getElementById(`title-${oId}`).value || "Zettel";
            if(oFn) {
                const span = document.createElement('span');
                span.className = 'link-pill';
                span.innerText = `[[${oFn}|${oTitle}]]`;
                span.onclick = () => document.getElementById(`note-${cId}`).value += ` ${span.innerText} `;
                pills.appendChild(span);
            }
        });
    });
}

async function runAI(id) {
    const key = document.getElementById('apiKey').value.trim();
    const text = document.getElementById(`quote-${id}`).value;
    if(!key || !text) return alert("Key/Inhalt fehlt!");
    const btn = document.querySelector(`#card-${id} .ai-btn`);
    btn.innerText = "⚡...";
    try {
        const response = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
            body: JSON.stringify({
                model: "gpt-4o-mini",
                messages: [{role: "system", content: "Antworte NUR JSON: {\"k\":\"Kürzel\",\"t\":\"Titel\",\"s\":\"Zusammenfassung\"}"}, {role: "user", content: text}]
            })
        });
        const data = await response.json();
        const res = JSON.parse(data.choices[0].message.content);
        document.getElementById(`kürzel-${id}`).value = res.k;
        document.getElementById(`title-${id}`).value = res.t;
        document.getElementById(`summary-${id}`).value = res.s;
        update(id);
    } catch (e) { alert("AI Fehler"); }
    btn.innerText = "✨ KI Vorschlag";
}

// GIST FUNKTIONEN
function getGistData() {
    const cards = [];
    document.querySelectorAll('.zettel-card').forEach(card => {
        const id = card.id.replace('card-', '');
        cards.push({
            parent: document.getElementById(`parent-${id}`).value,
            kuerzel: document.getElementById(`kürzel-${id}`).value,
            title: document.getElementById(`title-${id}`).value,
            quote: document.getElementById(`quote-${id}`).value,
            note: document.getElementById(`note-${id}`).value,
            summary: document.getElementById(`summary-${id}`).value
        });
    });
    return cards;
}

async function saveToGist() {
    const token = document.getElementById('githubToken').value.trim();
    const gistId = document.getElementById('gistId').value.trim();
    if (!token || !gistId) return alert("GitHub Token/ID fehlt!");
    try {
        const res = await fetch(`https://api.github.com/gists/${gistId}`, {
            method: 'PATCH',
            headers: { 'Authorization': `token ${token}` },
            body: JSON.stringify({ files: { "zettel_sync.json": { content: JSON.stringify(getGistData()) } } })
        });
        if (res.ok) alert("✅ Cloud-Speicher überschrieben!");
    } catch (e) { alert("Fehler beim Speichern"); }
}

async function loadFromGist() {
    const token = document.getElementById('githubToken').value.trim();
    const gistId = document.getElementById('gistId').value.trim();
    if (!token || !gistId) return alert("Token/ID fehlt!");
    try {
        const res = await fetch(`https://api.github.com/gists/${gistId}`, { headers: { 'Authorization': `token ${token}` } });
        const data = await res.json();
        const content = JSON.parse(data.files["zettel_sync.json"].content);
        document.getElementById('workbench').innerHTML = "";
        content.forEach(c => renderCardFromData(c));
        alert("🔄 Lokal zurückgesetzt und Cloud-Daten geladen.");
    } catch (e) { alert("Ladefehler"); }
}

async function mergeFromGist() {
    const token = document.getElementById('githubToken').value.trim();
    const gistId = document.getElementById('gistId').value.trim();
    if (!token || !gistId) return alert("Token/ID fehlt!");
    try {
        const res = await fetch(`https://api.github.com/gists/${gistId}`, { headers: { 'Authorization': `token ${token}` } });
        const data = await res.json();
        const remote = JSON.parse(data.files["zettel_sync.json"].content);
        const localPaths = Array.from(document.querySelectorAll('.zettel-card')).map(c => c.getAttribute('data-filename'));
        let added = 0;
        remote.forEach(c => {
            const path = c.parent ? `${c.parent}.${c.kuerzel}` : c.kuerzel;
            if (!localPaths.includes(path)) {
                renderCardFromData(c);
                added++;
            }
        });
        alert(`🌿 Merge fertig: ${added} neue Zettel hinzugefügt.`);
    } catch (e) { alert("Merge Fehler"); }
}

function renderCardFromData(c) {
    addZettel();
    const id = Array.from(document.querySelectorAll('.zettel-card')).pop().id.replace('card-', '');
    document.getElementById(`parent-${id}`).value = c.parent || "";
    document.getElementById(`kürzel-${id}`).value = c.kuerzel || "";
    document.getElementById(`title-${id}`).value = c.title || "";
    document.getElementById(`quote-${id}`).value = c.quote || "";
    document.getElementById(`note-${id}`).value = c.note || "";
    document.getElementById(`summary-${id}`).value = c.summary || "";
    update(id);
}

function clearWorkbench() {
    if(confirm("Schreibtisch wirklich leeren?")) { document.getElementById('workbench').innerHTML = ""; addZettel(); }
}

async function exportZip() {
    const zip = new JSZip();
    document.querySelectorAll('.zettel-card').forEach(card => {
        const id = card.id.replace('card-', '');
        const fn = card.getAttribute('data-filename');
        const kuerzel = card.getAttribute('data-kuerzel');
        if(!fn) return;
        const title = document.getElementById(`title-${id}`).value || "Unbenannt";
        const content = `---\ntitle: "${kuerzel} - ${title}"\naliases: ["${title}"]\ntype: zettel\n---\n# ${title}\n\n> [!abstract] Zusammenfassung\n> ${document.getElementById(`summary-${id}`).value}\n\n## 📝 Anmerkung\n${document.getElementById(`note-${id}`).value}\n\n## 📖 Quelle\n${document.getElementById(`quote-${id}`).value}`;
        zip.file(`${fn}.md`, content);
    });
    const blob = await zip.generateAsync({type:"blob"});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Zettel_Export_${new Date().toISOString().slice(0,10)}.zip`; a.click();
}

addZettel();
</script>
</body>
</html>
