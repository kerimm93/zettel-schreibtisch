<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zettel-Workbench v8.2 (Data Shield)</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg: #111110; --surface: #1c1c1a; --border: #2c2c29;
            --accent: #c4b48e; --ink: #e6e4dc; --ink-dim: #4e4c46;
            --mono: 'JetBrains Mono', monospace;
            --safe: #4e8c4e; --danger: #9e5a52;
        }
        body { font-family: 'Lora', serif; background: var(--bg); color: var(--ink); padding: 15px; line-height: 1.6; padding-bottom: 120px; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { font-family: var(--mono); font-size: 1rem; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        .api-config { background: #1a1a15; border: 1px dashed var(--border); padding: 15px; border-radius: 8px; margin-bottom: 25px; }
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 15px; }
        
        .zettel-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 30px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.4); transition: border-color 0.3s; }
        .zettel-card.dirty { border-color: var(--accent); }
        
        .path-row { display: flex; gap: 10px; margin-bottom: 20px; background: #161614; padding: 15px; border-radius: 6px; border: 1px solid #222; }
        
        label { font-family: var(--mono); font-size: 0.62rem; text-transform: uppercase; color: var(--ink-dim); display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; background: #000; border: 1px solid var(--border); color: var(--ink); padding: 10px; border-radius: 4px; font-family: inherit; font-size: 0.92rem; box-sizing: border-box;}
        
        .ai-btn { background: #2d2d2a; color: var(--accent); border: 1px solid var(--accent); padding: 8px 12px; font-size: 0.7rem; cursor: pointer; border-radius: 4px; font-family: var(--mono); transition: 0.2s; }
        .ai-btn:hover { background: var(--accent); color: #000; }
        
        .btn-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; }
        .group { display: flex; gap: 8px; }
        .backup-row { margin-top: 15px; padding: 10px; background: #111; border-radius: 6px; display: flex; gap: 10px; align-items: center; border: 1px solid #222; }

        .tree-preview { font-family: var(--mono); font-size: 0.72rem; color: var(--accent); margin-top: 12px; padding: 8px; background: #000; border-radius: 4px; border-left: 3px solid var(--accent); }
        .link-pill { cursor: pointer; background: var(--border); padding: 4px 10px; border-radius: 4px; margin-right: 8px; display: inline-block; margin-bottom: 8px; color: var(--accent); font-family: var(--mono); font-size: 0.75rem; border: 1px solid transparent;}

        .actions { position: sticky; bottom: 15px; display: flex; gap: 10px; background: rgba(17,17,16,0.95); padding: 15px; border-top: 1px solid var(--border); justify-content: center; backdrop-filter: blur(10px); z-index: 100; border-radius: 12px; }
        button.primary { background: var(--accent); color: #000; border: none; padding: 12px 20px; border-radius: 5px; font-family: var(--mono); font-weight: bold; cursor: pointer; font-size: 0.85rem;}
        .delete-btn { color: var(--danger); background: none; font-size: 0.65rem; border: none; cursor: pointer; position: absolute; top: 12px; right: 12px; font-family: var(--mono); opacity: 0.6;}
        .save-status { position: absolute; top: 12px; right: 80px; font-family: var(--mono); font-size: 0.6rem; color: var(--safe); opacity: 0.8; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Zettel-Workbench v8.2</h1>

    <div class="api-config">
        <div class="config-grid">
            <div><label>OpenAI Key</label><input type="password" id="apiKey" onchange="saveConfig()"></div>
            <div><label>GitHub Token</label><input type="password" id="githubToken" onchange="saveConfig()"></div>
            <div><label>Gist ID</label><input type="text" id="gistId" onchange="saveConfig()"></div>
        </div>
        
        <div class="btn-row">
            <div class="group">
                <button class="ai-btn" style="background: #2d3a2d; border-color: var(--safe); color: #a8e6a8;" onclick="mergeFromGist()">🌿 Smart Cloud Merge</button>
            </div>
            <div class="group">
                <button class="ai-btn" onclick="saveToGist()">☁️ Cloud Save (Overwrite!)</button>
                <button class="ai-btn" onclick="confirmLoadFromGist()">🔄 Cloud Load (Overwrite!)</button>
                <button class="ai-btn" style="border-color: var(--danger); color: var(--danger);" onclick="clearWorkbench()">🗑️ Reset Desk</button>
            </div>
        </div>

        <div class="backup-row">
            <label style="margin-bottom:0; margin-right:10px; font-size: 0.6rem;">Lokal-Sicherung:</label>
            <button class="ai-btn" onclick="exportJSON()">💾 JSON Export</button>
            <button class="ai-btn" onclick="document.getElementById('importFile').click()">📥 JSON Import</button>
            <input type="file" id="importFile" accept=".json" onchange="importJSON(event)">
        </div>
    </div>
    
    <div id="workbench"></div>

    <div class="actions">
        <button class="primary" onclick="addZettel()">+ Neuer Zettel</button>
        <button style="background:none; border:1px solid var(--accent); color:var(--accent); padding:12px 20px; border-radius:5px; cursor:pointer; font-family: var(--mono); font-size: 0.85rem;" onclick="exportZip()">📦 ZIP Export</button>
    </div>
</div>

<script>
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

function saveConfig() {
    localStorage.setItem('zw_config', JSON.stringify({
        ai: document.getElementById('apiKey').value,
        gh: document.getElementById('githubToken').value,
        gi: document.getElementById('gistId').value
    }));
}

function loadConfig() {
    const cfg = JSON.parse(localStorage.getItem('zw_config'));
    if(cfg) {
        document.getElementById('apiKey').value = cfg.ai || "";
        document.getElementById('githubToken').value = cfg.gh || "";
        document.getElementById('gistId').value = cfg.gi || "";
    }
}

function addZettel() {
    const id = Date.now();
    const card = document.createElement('div');
    card.className = 'zettel-card';
    card.id = `card-${id}`;
    card.innerHTML = `
        <span id="status-${id}" class="save-status">Lokal gesichert</span>
        <button class="delete-btn" onclick="removeCard(${id})">[Löschen]</button>
        <div class="path-row">
            <div style="flex:2"><label>Parent</label><input type="text" id="parent-${id}" oninput="update(${id})"></div>
            <div style="flex:1"><label>Kürzel</label><input type="text" id="kürzel-${id}" oninput="update(${id})"></div>
        </div>
        <div style="margin-bottom:15px">
            <label>Zitat</label>
            <textarea id="quote-${id}" oninput="update(${id})"></textarea>
            <button class="ai-btn" style="margin-top:10px" onclick="runAI(${id})">✨ KI Vorschlag</button>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
            <div style="grid-column: span 2"><label>Titel</label><input type="text" id="title-${id}" oninput="update(${id})"></div>
            <div style="grid-column: span 2"><label>Summary</label><input type="text" id="summary-${id}" oninput="update(${id})"></div>
            <div style="grid-column: span 2"><label>Anmerkung</label><textarea id="note-${id}" oninput="update(${id})"></textarea></div>
        </div>
        <div id="preview-${id}" class="tree-preview"></div>
        <div id="pills-${id}" style="margin-top:15px"></div>
    `;
    document.getElementById('workbench').appendChild(card);
    update(id);
    return id;
}

function removeCard(id) {
    if(confirm("Diesen Zettel wirklich löschen?")) {
        document.getElementById(`card-${id}`).remove();
        updateAll();
        autoSaveLocal();
    }
}

function update(id) {
    const p = document.getElementById(`parent-${id}`).value.trim();
    const k = document.getElementById(`kürzel-${id}`).value.trim().replace(/[^a-zA-Z0-9.]/g, '');
    const t = document.getElementById(`title-${id}`).value.trim();
    const fn = p ? `${p}.${k}` : k;
    
    const card = document.getElementById(`card-${id}`);
    if(!card) return;
    card.setAttribute('data-filename', fn);
    card.setAttribute('data-kuerzel', k);
    document.getElementById(`preview-${id}`).innerText = `Baum: ${t ? k + ' - ' + t : k}`;
    
    document.getElementById(`status-${id}`).innerText = "Änderung...";
    updateAll();
    autoSaveLocal();
    setTimeout(() => { 
        if(document.getElementById(`status-${id}`)) 
            document.getElementById(`status-${id}`).innerText = "Lokal gesichert"; 
    }, 1000);
}

function updateAll() {
    const cards = document.querySelectorAll('.zettel-card');
    cards.forEach(card => {
        const cId = card.id.replace('card-', '');
        const pills = document.getElementById(`pills-${cId}`);
        if(!pills) return;
        pills.innerHTML = "<label>Link:</label>";
        cards.forEach(other => {
            const oId = other.id.replace('card-', '');
            if(cId === oId) return;
            const oFn = other.getAttribute('data-filename');
            const oT = document.getElementById(`title-${oId}`).value || "Zettel";
            if(oFn && oFn !== "") {
                const s = document.createElement('span');
                s.className = 'link-pill'; s.innerText = `[[${oFn}|${oT}]]`;
                s.onclick = () => { document.getElementById(`note-${cId}`).value += ` ${s.innerText} `; update(cId); };
                pills.appendChild(s);
            }
        });
    });
}

function collectData() {
    return Array.from(document.querySelectorAll('.zettel-card')).map(card => {
        const id = card.id.replace('card-', '');
        return {
            p: document.getElementById(`parent-${id}`).value,
            k: document.getElementById(`kürzel-${id}`).value,
            t: document.getElementById(`title-${id}`).value,
            q: document.getElementById(`quote-${id}`).value,
            n: document.getElementById(`note-${id}`).value,
            s: document.getElementById(`summary-${id}`).value
        };
    });
}

function autoSaveLocal() {
    localStorage.setItem('zw_autosave', JSON.stringify(collectData()));
}

function loadLocal() {
    const data = JSON.parse(localStorage.getItem('zw_autosave'));
    if(data && data.length > 0) {
        document.getElementById('workbench').innerHTML = "";
        data.forEach(d => renderCard(d));
    } else { addZettel(); }
}

function renderCard(d) {
    const allCards = document.querySelectorAll('.zettel-card');
    let targetId;
    if (allCards.length === 1) {
        const firstId = allCards[0].id.replace('card-', '');
        const isBlank = !document.getElementById(`parent-${firstId}`).value && !document.getElementById(`kürzel-${firstId}`).value && !document.getElementById(`quote-${firstId}`).value;
        if (isBlank) targetId = firstId;
    }
    if (!targetId) targetId = addZettel();
    document.getElementById(`parent-${targetId}`).value = d.p || d.parent || "";
    document.getElementById(`kürzel-${targetId}`).value = d.k || d.kuerzel || "";
    document.getElementById(`title-${targetId}`).value = d.t || d.title || "";
    document.getElementById(`quote-${targetId}`).value = d.q || d.quote || "";
    document.getElementById(`note-${targetId}`).value = d.n || d.note || "";
    document.getElementById(`summary-${targetId}`).value = d.s || d.summary || "";
    update(targetId);
}

// GIST LOGIK
async function mergeFromGist() {
    const token = document.getElementById('githubToken').value.trim();
    const gistId = document.getElementById('gistId').value.trim();
    if (!token || !gistId) return alert("GitHub Daten fehlen!");
    try {
        const res = await fetch(`https://api.github.com/gists/${gistId}`, { headers: { 'Authorization': `token ${token}` } });
        const data = await res.json();
        const remote = JSON.parse(data.files["zettel_sync.json"].content);
        
        const localCards = {};
        document.querySelectorAll('.zettel-card').forEach(card => {
            localCards[card.getAttribute('data-filename')] = card.id.replace('card-', '');
        });

        let added = 0, updated = 0;
        remote.forEach(c => {
            const path = c.parent ? `${c.parent}.${c.kuerzel}` : c.kuerzel;
            if (localCards[path]) {
                const id = localCards[path];
                // Deep Comparison aller Felder
                const isIdentical = 
                    document.getElementById(`quote-${id}`).value.trim() === (c.quote || "").trim() &&
                    document.getElementById(`title-${id}`).value.trim() === (c.title || "").trim() &&
                    document.getElementById(`note-${id}`).value.trim() === (c.note || "").trim() &&
                    document.getElementById(`summary-${id}`).value.trim() === (c.summary || "").trim();

                if (!isIdentical) {
                    // Falls lokal leer, füllen. Sonst Kopie!
                    if (document.getElementById(`quote-${id}`).value.trim() === "") {
                        renderCard(c); updated++;
                    } else {
                        const copy = {...c}; copy.kuerzel += "_cloud_copy"; renderCard(copy); added++;
                    }
                }
            } else { renderCard(c); added++; }
        });
        alert(`🌿 Merge beendet: ${added} neu/Kopien, ${updated} befüllt.`);
    } catch (e) { alert("Fehler beim Mergen"); }
}

async function saveToGist() {
    if(!confirm("Dies überschreibt den Stand in der Cloud komplett mit deinem aktuellen Desk. Fortfahren?")) return;
    const token = document.getElementById('githubToken').value.trim();
    const gistId = document.getElementById('gistId').value.trim();
    try {
        const res = await fetch(`https://api.github.com/gists/${gistId}`, {
            method: 'PATCH',
            headers: { 'Authorization': `token ${token}` },
            body: JSON.stringify({ files: { "zettel_sync.json": { content: JSON.stringify(collectData()) } } })
        });
        if (res.ok) alert("✅ Cloud überschrieben!");
    } catch (e) { alert("Fehler"); }
}

function confirmLoadFromGist() {
    if(confirm("ACHTUNG: Dies löscht alle aktuellen Zettel auf dem Desk und lädt den Stand aus der Cloud. Wirklich?")) loadFromGist();
}

async function loadFromGist() {
    const token = document.getElementById('githubToken').value.trim();
    const gistId = document.getElementById('gistId').value.trim();
    try {
        const res = await fetch(`https://api.github.com/gists/${gistId}`, { headers: { 'Authorization': `token ${token}` } });
        const data = await res.json();
        const content = JSON.parse(data.files["zettel_sync.json"].content);
        document.getElementById('workbench').innerHTML = "";
        content.forEach(c => renderCard(c));
    } catch (e) { alert("Fehler"); }
}

// BACKUP & EXPORT
function exportJSON() {
    const data = JSON.stringify(collectData(), null, 2);
    const blob = new Blob([data], {type: "application/json"});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `Zettel_Backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
}

function importJSON(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const data = JSON.parse(e.target.result);
        if(confirm("Zettel hinzufügen (OK) oder alles ersetzen (Abbrechen)?")) { data.forEach(d => renderCard(d)); } 
        else { document.getElementById('workbench').innerHTML = ""; data.forEach(d => renderCard(d)); }
    };
    reader.readAsText(file);
}

async function runAI(id) {
    const key = document.getElementById('apiKey').value.trim();
    const text = document.getElementById(`quote-${id}`).value;
    if(!key || !text) return alert("Key oder Inhalt fehlt!");
    try {
        const response = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
            body: JSON.stringify({ model: "gpt-4o-mini", messages: [{role: "system", content: "Antworte NUR JSON: {\"k\":\"Kürzel\",\"t\":\"Titel\",\"s\":\"Zusammenfassung\"}"}, {role: "user", content: text}] })
        });
        const data = await response.json();
        const res = JSON.parse(data.choices[0].message.content);
        document.getElementById(`kürzel-${id}`).value = res.k;
        document.getElementById(`title-${id}`).value = res.t;
        document.getElementById(`summary-${id}`).value = res.s;
        update(id);
    } catch (e) { alert("AI Fehler"); }
}

function clearWorkbench() {
    if(confirm("Lokal leeren? Cloud bleibt erhalten.")) { 
        document.getElementById('workbench').innerHTML = ""; 
        localStorage.removeItem('zw_autosave');
        addZettel(); 
    }
}

async function exportZip() {
    const zip = new JSZip();
    document.querySelectorAll('.zettel-card').forEach(card => {
        const id = card.id.replace('card-', ''), fn = card.getAttribute('data-filename'), k = card.getAttribute('data-kuerzel');
        if(!fn || fn === "") return;
        const t = document.getElementById(`title-${id}`).value || "Unbenannt";
        const content = `---\ntitle: "${k} - ${t}"\naliases: ["${t}"]\ntype: zettel\n---\n# ${t}\n\n> [!abstract] Zusammenfassung\n> ${document.getElementById(`summary-${id}`).value}\n\n## 📝 Anmerkung\n${document.getElementById(`note-${id}`).value}\n\n## 📖 Quelle\n${document.getElementById(`quote-${id}`).value}`;
        zip.file(`${fn}.md`, content);
    });
    const blob = await zip.generateAsync({type:"blob"});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Zettel_Export_${new Date().toISOString().slice(0,10)}.zip`; a.click();
}

loadConfig();
loadLocal();
</script>
</body>
</html>
