<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#111110">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Zettel">
    <link rel="manifest" href="./manifest.json">
    <title>Zettel-Workbench v8.5 (Stability Update)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg: #111110; --surface: #1c1c1a; --border: #2c2c29;
            --accent: #c4b48e; --ink: #e6e4dc; --ink-dim: #4e4c46;
            --mono: 'JetBrains Mono', monospace;
            --safe: #4e8c4e; --danger: #9e5a52;
        }
        body { font-family: 'Lora', serif; background: var(--bg); color: var(--ink); padding: 15px; margin: 0; padding-bottom: 120px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { font-family: var(--mono); font-size: 1rem; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 10px; text-transform: uppercase; }
        .api-config { background: #1a1a15; border: 1px dashed var(--border); padding: 15px; border-radius: 8px; margin-bottom: 25px; }
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .zettel-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 30px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .path-row { display: flex; gap: 10px; margin-bottom: 20px; background: #161614; padding: 15px; border-radius: 6px; border: 1px solid #222; }
        label { font-family: var(--mono); font-size: 0.62rem; text-transform: uppercase; color: var(--ink-dim); display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; background: #000; border: 1px solid var(--border); color: var(--ink); padding: 10px; border-radius: 4px; font-family: inherit; font-size: 0.92rem; box-sizing: border-box;}
        .ai-btn { background: #2d2d2a; color: var(--accent); border: 1px solid var(--accent); padding: 8px 12px; font-size: 0.7rem; cursor: pointer; border-radius: 4px; font-family: var(--mono); }
        .btn-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; }
        .group { display: flex; gap: 8px; }
        .tree-preview { font-family: var(--mono); font-size: 0.72rem; color: var(--accent); margin-top: 12px; padding: 8px; background: #000; border-radius: 4px; border-left: 3px solid var(--accent); }
        .link-pill { cursor: pointer; background: var(--border); padding: 4px 10px; border-radius: 4px; margin-right: 8px; display: inline-block; margin-bottom: 8px; color: var(--accent); font-family: var(--mono); font-size: 0.75rem; border: 1px solid transparent;}
        .actions { position: sticky; bottom: 15px; display: flex; gap: 10px; background: rgba(17,17,16,0.95); padding: 15px; border-top: 1px solid var(--border); justify-content: center; backdrop-filter: blur(10px); z-index: 100; border-radius: 12px; }
        button.primary { background: var(--accent); color: #000; border: none; padding: 12px 20px; border-radius: 5px; font-family: var(--mono); font-weight: bold; cursor: pointer; }
        .delete-btn { color: var(--danger); background: none; font-size: 0.65rem; border: none; cursor: pointer; position: absolute; top: 12px; right: 12px; font-family: var(--mono); opacity: 0.6;}
        .save-status { position: absolute; top: 12px; right: 80px; font-family: var(--mono); font-size: 0.6rem; color: var(--safe); opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <h1>Zettel-Workbench v8.5</h1>
    <div class="api-config">
        <div class="config-grid">
            <div><label>OpenAI Key</label><input type="password" id="apiKey" onchange="saveConfig()"></div>
            <div><label>GitHub Token</label><input type="password" id="githubToken" onchange="saveConfig()"></div>
            <div><label>Gist ID</label><input type="text" id="gistId" onchange="saveConfig()"></div>
        </div>
        <div class="btn-row">
            <div class="group"><button class="ai-btn" style="background: #2d3a2d; border-color: var(--safe); color: #a8e6a8;" onclick="mergeFromGist()">🌿 Smart Cloud Merge</button></div>
            <div class="group">
                <button class="ai-btn" onclick="saveToGist()">☁️ Cloud Save</button>
                <button class="ai-btn" onclick="confirmLoadFromGist()">🔄 Cloud Load</button>
                <button class="ai-btn" style="border-color: var(--danger); color: var(--danger);" onclick="clearWorkbench()">🗑️ Reset Desk</button>
            </div>
        </div>
    </div>
    <div id="workbench"></div>
    <div class="actions">
        <button class="primary" onclick="addZettel()">+ Neuer Zettel</button>
        <button style="background:none; border:1px solid var(--accent); color:var(--accent); padding:12px 20px; border-radius:5px; cursor:pointer; font-family: var(--mono);" onclick="exportZip()">📦 ZIP Export</button>
    </div>
</div>

<script>
let isMerging = false;
const GIST_FILENAME = "zettel_sync.json";

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch((err) => {
            console.warn('Service-Worker Registrierung fehlgeschlagen:', err);
        });
    });
}

function saveConfig() {
    localStorage.setItem('zw_config', JSON.stringify({
        ai: document.getElementById('apiKey').value,
        gh: document.getElementById('githubToken').value,
        gi: document.getElementById('gistId').value
    }));
}

function loadConfig() {
    const cfg = JSON.parse(localStorage.getItem('zw_config'));
    if(cfg) {
        document.getElementById('apiKey').value = cfg.ai || "";
        document.getElementById('githubToken').value = cfg.gh || "";
        document.getElementById('gistId').value = cfg.gi || "";
    }
}

function addZettel() {
    const id = Date.now() + Math.floor(Math.random() * 1000);
    const card = document.createElement('div');
    card.className = 'zettel-card';
    card.id = `card-${id}`;
    card.innerHTML = `
        <span id="status-${id}" class="save-status">Lokal gesichert</span>
        <button class="delete-btn" onclick="removeCard(${id})">[Löschen]</button>
        <div class="path-row">
            <div style="flex:2"><label>Parent</label><input type="text" id="parent-${id}" oninput="update(${id})"></div>
            <div style="flex:1"><label>Kürzel</label><input type="text" id="kürzel-${id}" oninput="update(${id})"></div>
        </div>
        <div style="margin-bottom:15px">
            <label>Zitat</label>
            <textarea id="quote-${id}" oninput="update(${id})"></textarea>
            <button class="ai-btn" style="margin-top:10px" onclick="runAI(${id})">✨ KI Vorschlag</button>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
            <div style="grid-column: span 2"><label>Titel</label><input type="text" id="title-${id}" oninput="update(${id})"></div>
            <div style="grid-column: span 2"><label>Summary</label><input type="text" id="summary-${id}" oninput="update(${id})"></div>
            <div style="grid-column: span 2"><label>Anmerkung</label><textarea id="note-${id}" oninput="update(${id})"></textarea></div>
        </div>
        <div id="preview-${id}" class="tree-preview"></div>
        <div id="pills-${id}" style="margin-top:15px"></div>
    `;
    document.getElementById('workbench').appendChild(card);
    update(id);
    return id;
}

function removeCard(id) {
    if(confirm("Löschen?")) { document.getElementById(`card-${id}`).remove(); updateAll(); autoSaveLocal(); }
}

function update(id) {
    const p = (document.getElementById(`parent-${id}`).value || "").trim();
    const k = (document.getElementById(`kürzel-${id}`).value || "").trim().replace(/[^a-zA-Z0-9.]/g, '');
    const t = (document.getElementById(`title-${id}`).value || "").trim();
    const fn = p ? `${p}.${k}` : k;
    const card = document.getElementById(`card-${id}`);
    if(!card) return;
    card.setAttribute('data-filename', fn.toLowerCase());
    document.getElementById(`preview-${id}`).innerText = `Pfad: ${fn}`;
    
    updateAll(); 
    if(!isMerging) autoSaveLocal();
}

function updateAll() {
    const cards = document.querySelectorAll('.zettel-card');
    cards.forEach(card => {
        const cId = card.id.replace('card-', '');
        const pills = document.getElementById(`pills-${cId}`);
        if(!pills) return;
        pills.innerHTML = "<label>Link-Vorschläge:</label>";
        cards.forEach(other => {
            const oId = other.id.replace('card-', '');
            if(cId === oId) return;
            const oFn = other.getAttribute('data-filename');
            const oT = document.getElementById(`title-${oId}`).value || "Zettel";
            if(oFn && oFn !== "") {
                const s = document.createElement('span');
                s.className = 'link-pill'; s.innerText = `[[${oFn}|${oT}]]`;
                s.onclick = () => { document.getElementById(`note-${cId}`).value += ` ${s.innerText} `; update(cId); };
                pills.appendChild(s);
            }
        });
    });
}

function collectData() {
    return Array.from(document.querySelectorAll('.zettel-card')).map(card => {
        const id = card.id.replace('card-', '');
        return {
            p: document.getElementById(`parent-${id}`).value.trim(),
            k: document.getElementById(`kürzel-${id}`).value.trim(),
            t: document.getElementById(`title-${id}`).value.trim(),
            q: document.getElementById(`quote-${id}`).value.trim(),
            n: document.getElementById(`note-${id}`).value.trim(),
            s: document.getElementById(`summary-${id}`).value.trim()
        };
    });
}

function normalizePath(entry) {
    const clean = (value) => (value || "")
        .toString()
        .trim()
        .toLowerCase()
        .replace(/\.+/g, '.')
        .replace(/^\.+|\.+$/g, '');
    const parent = clean(entry.p || entry.parent || "");
    const kuerzel = clean(entry.k || entry.kuerzel || "");
    if (parent && kuerzel) return `${parent}.${kuerzel}`;
    return parent || kuerzel || "";
}

function normalizeText(value) {
    return (value || "").replace(/\s+/g, " ").trim();
}

function buildContentSignature(entry) {
    return [entry.q || entry.quote, entry.t || entry.title, entry.n || entry.note, entry.s || entry.summary]
        .map(normalizeText)
        .join("||");
}

function normalizeEntry(entry) {
    return {
        p: normalizeText(entry.p || entry.parent || ""),
        k: normalizeText(entry.k || entry.kuerzel || ""),
        t: normalizeText(entry.t || entry.title || ""),
        q: normalizeText(entry.q || entry.quote || ""),
        n: normalizeText(entry.n || entry.note || ""),
        s: normalizeText(entry.s || entry.summary || "")
    };
}

function fillCardById(id, data) {
    if (!document.getElementById(`card-${id}`)) return false;
    document.getElementById(`parent-${id}`).value = data.p || "";
    document.getElementById(`kürzel-${id}`).value = data.k || "";
    document.getElementById(`title-${id}`).value = data.t || "";
    document.getElementById(`quote-${id}`).value = data.q || "";
    document.getElementById(`note-${id}`).value = data.n || "";
    document.getElementById(`summary-${id}`).value = data.s || "";
    update(id);
    return true;
}

async function fetchWithTimeoutRetry(url, options = {}, retryOptions = {}) {
    const timeoutMs = retryOptions.timeoutMs || 12000;
    const retries = retryOptions.retries || 2;
    let lastError;
    for (let attempt = 0; attempt <= retries; attempt++) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(new Error('timeout')), timeoutMs);
        try {
            const response = await fetch(url, { ...options, signal: controller.signal });
            clearTimeout(timer);
            if (response.status >= 500 && attempt < retries) {
                await new Promise(resolve => setTimeout(resolve, 400 * (attempt + 1)));
                continue;
            }
            return response;
        } catch (error) {
            clearTimeout(timer);
            lastError = error;
            if (attempt === retries) break;
            await new Promise(resolve => setTimeout(resolve, 400 * (attempt + 1)));
        }
    }
    throw lastError || new Error("Unbekannter Netzwerkfehler");
}

function autoSaveLocal() { localStorage.setItem('zw_autosave', JSON.stringify(collectData())); }

function loadLocal() {
    const data = JSON.parse(localStorage.getItem('zw_autosave'));
    if(data && data.length > 0) {
        document.getElementById('workbench').innerHTML = "";
        data.forEach(d => renderCard(d));
    } else { addZettel(); }
}

function renderCard(d) {
    const allCards = document.querySelectorAll('.zettel-card');
    let targetId;
    if (allCards.length === 1) {
        const firstId = allCards[0].id.replace('card-', '');
        if (!document.getElementById(`parent-${firstId}`).value && !document.getElementById(`kürzel-${firstId}`).value && !document.getElementById(`quote-${firstId}`).value) {
            targetId = firstId;
        }
    }
    if (!targetId) targetId = addZettel();
    document.getElementById(`parent-${targetId}`).value = d.p || d.parent || "";
    document.getElementById(`kürzel-${targetId}`).value = d.k || d.kuerzel || "";
    document.getElementById(`title-${targetId}`).value = d.t || d.title || "";
    document.getElementById(`quote-${targetId}`).value = d.q || d.quote || "";
    document.getElementById(`note-${targetId}`).value = d.n || d.note || "";
    document.getElementById(`summary-${targetId}`).value = d.s || d.summary || "";
    update(targetId);
}

async function mergeFromGist() {
    isMerging = true;
    const token = document.getElementById('githubToken').value.trim();
    const gistId = document.getElementById('gistId').value.trim();
    if (!token || !gistId) { isMerging = false; return alert("GitHub Daten fehlen!"); }
    
    try {
        const res = await fetchWithTimeoutRetry(`https://api.github.com/gists/${gistId}`, {
            headers: { 'Authorization': `token ${token}`, 'Cache-Control': 'no-cache' } 
        }, { timeoutMs: 15000, retries: 2 });
        
        if (!res.ok) throw new Error(`GitHub-Server Fehler (Status ${res.status})`);

        const data = await res.json();
        const file = data.files[GIST_FILENAME];
        if (!file || !file.content) throw new Error("Cloud-Datei nicht gefunden oder leer.");

        let remote;
        try { remote = JSON.parse(file.content); } 
        catch (e) { throw new Error("Daten in der Cloud sind kein gültiges JSON."); }
        if (!Array.isArray(remote)) throw new Error("Cloud-Datei hat ein ungültiges Format (Array erwartet).");
        
        const localDataMap = {};
        const localSignatures = new Set();
        const localBySignature = new Set();
        document.querySelectorAll('.zettel-card').forEach(card => {
            const id = card.id.replace('card-', '');
            const localEntry = normalizeEntry({
                p: document.getElementById(`parent-${id}`).value,
                k: document.getElementById(`kürzel-${id}`).value,
                q: document.getElementById(`quote-${id}`).value,
                t: document.getElementById(`title-${id}`).value,
                n: document.getElementById(`note-${id}`).value,
                s: document.getElementById(`summary-${id}`).value
            });
            const path = normalizePath(localEntry);
            localDataMap[path] = {
                id: id,
                ...localEntry
            };
            const signature = buildContentSignature(localEntry);
            localSignatures.add(`${path}::${signature}`);
            localBySignature.add(signature);
        });

        const seenRemote = new Set();
        let added = 0, updated = 0, skipped = 0;
        remote.forEach(c => {
            const normalizedRemote = normalizeEntry(c);
            const rPath = normalizePath(normalizedRemote);
            const signature = buildContentSignature(normalizedRemote);
            const dedupKey = `${rPath}::${signature}`;
            if (seenRemote.has(dedupKey)) {
                skipped++;
                return;
            }
            seenRemote.add(dedupKey);

            if (localDataMap[rPath]) {
                const l = localDataMap[rPath];
                const isIdentical = buildContentSignature(l) === signature;
                if (!isIdentical) {
                    if (l.q === "" && l.t === "") {
                        if (fillCardById(l.id, normalizedRemote)) {
                            updated++;
                            localDataMap[rPath] = { id: l.id, ...normalizedRemote };
                            localSignatures.add(`${rPath}::${signature}`);
                            localBySignature.add(signature);
                        }
                    } else {
                        if (!localSignatures.has(dedupKey) && !localBySignature.has(signature)) {
                            const copy = { ...normalizedRemote, k: `${normalizedRemote.k || 'zettel'}_conflict` };
                            renderCard(copy);
                            added++;
                            localSignatures.add(`${normalizePath(copy)}::${buildContentSignature(copy)}`);
                            localBySignature.add(signature);
                        } else {
                            skipped++;
                        }
                    }
                }
            } else {
                if (!localSignatures.has(dedupKey) && !localBySignature.has(signature)) {
                    renderCard(normalizedRemote);
                    added++;
                    localSignatures.add(dedupKey);
                    localBySignature.add(signature);
                } else {
                    skipped++;
                }
            }
        });

        const mergedContent = JSON.stringify(collectData());
        const writeRes = await fetchWithTimeoutRetry(`https://api.github.com/gists/${gistId}`, {
            method: 'PATCH',
            headers: { 'Authorization': `token ${token}` },
            body: JSON.stringify({ files: { [GIST_FILENAME]: { content: mergedContent } } })
        }, { timeoutMs: 15000, retries: 1 });
        if (!writeRes.ok) throw new Error(`Merge gespeichert, aber Cloud-Write fehlgeschlagen (Status ${writeRes.status}).`);

        alert(`🌿 Merge Erfolg: ${added} neu/Konflikte, ${updated} befüllt, ${skipped} Duplikate übersprungen. Cloud wurde konvergiert.`);
    } catch (e) { 
        const isTimeout = e.name === "AbortError" || e.message === "timeout";
        const message = isTimeout
            ? "Zeitüberschreitung beim Abruf. Bitte Netzwerk prüfen und erneut versuchen."
            : e.message || "Unbekannter Fehler beim Merge.";
        alert(`⚠️ Merge Fehler: ${message}`); 
    }
    isMerging = false;
    autoSaveLocal();
}

async function saveToGist() {
    const token = document.getElementById('githubToken').value.trim();
    const gistId = document.getElementById('gistId').value.trim();
    try {
        const res = await fetchWithTimeoutRetry(`https://api.github.com/gists/${gistId}`, {
            method: 'PATCH',
            headers: { 'Authorization': `token ${token}` },
            body: JSON.stringify({ files: { [GIST_FILENAME]: { content: JSON.stringify(collectData()) } } })
        }, { timeoutMs: 15000, retries: 1 });
        if (res.ok) alert("✅ Cloud Save OK!");
        else alert("Save Fehler: " + res.status);
    } catch (e) { alert("Fehler: " + e.message); }
}

function confirmLoadFromGist() { if(confirm("Überschreibt ALLES lokal. Wirklich?")) loadFromGist(); }
async function loadFromGist() {
    const token = document.getElementById('githubToken').value.trim();
    const gistId = document.getElementById('gistId').value.trim();
    try {
        const res = await fetchWithTimeoutRetry(`https://api.github.com/gists/${gistId}`, { headers: { 'Authorization': `token ${token}` } }, { timeoutMs: 15000, retries: 1 });
        if (!res.ok) throw new Error(`GitHub-Server Fehler (Status ${res.status})`);
        const data = await res.json();
        const file = data.files && data.files[GIST_FILENAME];
        if (!file || !file.content) throw new Error("Cloud-Datei nicht gefunden oder leer.");
        let content;
        try { content = JSON.parse(file.content); }
        catch (e) { throw new Error("Cloud-Datei enthält ungültiges JSON."); }
        if (!Array.isArray(content)) throw new Error("Cloud-Datei hat ein ungültiges Format (Array erwartet).");
        document.getElementById('workbench').innerHTML = "";
        content.forEach(c => renderCard(c));
    } catch (e) { alert("Fehler: " + e.message); }
}

async function runAI(id) {
    const key = document.getElementById('apiKey').value.trim();
    const text = document.getElementById(`quote-${id}`).value;
    if(!key || !text) return alert("Key/Text fehlt!");
    try {
        const response = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
            body: JSON.stringify({ model: "gpt-4o-mini", messages: [{role: "system", content: "Antworte NUR JSON: {\"k\":\"Kürzel\",\"t\":\"Titel\",\"s\":\"Zusammenfassung\"}"}, {role: "user", content: text}] })
        });
        const data = await response.json();
        const res = JSON.parse(data.choices[0].message.content);
        document.getElementById(`kürzel-${id}`).value = res.k;
        document.getElementById(`title-${id}`).value = res.t;
        document.getElementById(`summary-${id}`).value = res.s;
        update(id);
    } catch (e) { alert("AI Fehler"); }
}

function clearWorkbench() { if(confirm("Reset?")) { document.getElementById('workbench').innerHTML = ""; localStorage.removeItem('zw_autosave'); addZettel(); } }

async function exportZip() {
    const zip = new JSZip();
    document.querySelectorAll('.zettel-card').forEach(card => {
        const id = card.id.replace('card-', ''), fn = card.getAttribute('data-filename');
        if(!fn) return;
        const t = document.getElementById(`title-${id}`).value || "Unbenannt";
        const content = `---\ntitle: "${t}"\ntype: zettel\n---\n# ${t}\n\n> [!abstract] Zusammenfassung\n> ${document.getElementById(`summary-${id}`).value}\n\n## 📝 Anmerkung\n${document.getElementById(`note-${id}`).value}\n\n## 📖 Quelle\n${document.getElementById(`quote-${id}`).value}`;
        zip.file(`${fn}.md`, content);
    });
    const blob = await zip.generateAsync({type:"blob"});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Export.zip`; a.click();
}

loadConfig(); loadLocal();
</script>
</body>
</html>
